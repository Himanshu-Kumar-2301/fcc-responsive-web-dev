<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Styled To-Do List</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>My To-Do List</h1>
      <ul class="todo-list">
        <li>
          <input type="checkbox" id="deliver-parcel" />
          <label for="deliver-parcel">Deliver parcels</label>
          <ul class="sub-item">
            <li><a href="#" target="_blank">View Receipt</a></li>
          </ul>
        </li>
        <li>
          <input type="checkbox" id="explore-mouse" />
          <label for="explore-mouse">Explore the gaming mouses</label>
          <ul class="sub-item">
            <li><a href="#" target="_blank">Store link</a></li>
          </ul>
        </li>
        <li>
          <input type="checkbox" id="write-essay" />
          <label for="write-essay">Write an essay</label>
          <ul class="sub-item">
            <li><a href="#" target="_blank">Submission Link</a></li>
          </ul>
        </li>
        <li>
          <input type="checkbox" id="review-pr" />
          <label for="review-pr">Review pull requests</label>
          <ul class="sub-item">
            <li><a href="#" target="_blank">View PR</a></li>
          </ul>
        </li>
      </ul>
    </main>
  </body>
</html>
