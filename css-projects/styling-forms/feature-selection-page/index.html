<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" description="width=device-width, initial-scale=1.0" />
    <title>Selection Feature Page</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <h1>Feature Selection</h1>
    <div class="feature-card-container">
      <label class="feature-card" for="cloud-storage">
        <input type="checkbox" id="cloud-storage" />
        <h2>Cloud Storage</h2>
        <p>100 Gigbyte secure storage</p>
      </label>
      <label class="feature-card" for="dedicated-support">
        <input type="checkbox" id="dedicated-support" />
        <h2>Dedicated Support</h2>
        <p>27/7 customer help</p>
      </label>
      <label class="feature-card" for="advance-analytics">
        <input type="checkbox" id="advance-analytics" />
        <h2>Advance Analytics</h2>
        <p>Insight & reports</p>
      </label>
      <label class="feature-card" for="custom-user-theme">
        <input type="checkbox" id="custom-user-theme" />
        <h2>Custom User Themes</h2>
        <p>Personalized dashboard design</p>
      </label>
      <label class="feature-card" for="multi-user-collab">
        <input type="checkbox" id="multi-user-collab" />
        <h2>Multi-User Collab</h2>
        <p>Team access and sharing</p>
      </label>
      <label class="feature-card" for="api-access">
        <input type="checkbox" id="api-access" />
        <h2>API Access</h2>
        <p>Integrate with your custom build tools</p>
      </label>
    </div>
  </body>
</html>
